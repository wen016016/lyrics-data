<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歌詞</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0d0f;
            --surface: #131316;
            --border: rgba(255,255,255,0.07);
            --text: #e8e4dc;
            --muted: #7a7570;
            --accent1: #c9a96e;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Noto Serif JP', serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

            body::before {
                content: '';
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 0;
            }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 760px;
            margin: 0 auto;
            padding: 60px 24px 100px;
        }

        /* Header */
        .site-header {
            text-align: center;
            margin-bottom: 56px;
        }

            .site-header .label {
                font-family: 'Cormorant Garamond', serif;
                font-style: italic;
                font-size: 12px;
                letter-spacing: 0.25em;
                color: var(--muted);
                text-transform: uppercase;
                margin-bottom: 12px;
            }

            .site-header h1 {
                font-family: 'Cormorant Garamond', serif;
                font-weight: 300;
                font-size: clamp(28px, 5vw, 42px);
                letter-spacing: 0.06em;
            }

        .divider {
            width: 40px;
            height: 1px;
            background: var(--accent1);
            margin: 20px auto 0;
            opacity: 0.6;
        }

        /* Artist filter */
        .artist-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .artist-filter-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'Noto Serif JP', serif;
            font-size: 12px;
            letter-spacing: 0.05em;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

            .artist-filter-btn:hover {
                color: var(--text);
                border-color: var(--text);
            }

            .artist-filter-btn.active {
                background: var(--accent1);
                color: var(--bg);
                border-color: var(--accent1);
            }

        /* Tab nav */
        .tab-nav {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 48px;
            overflow-x: auto;
            scrollbar-width: none;
        }

            .tab-nav::-webkit-scrollbar {
                display: none;
            }

        .tab-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-family: 'Noto Serif JP', serif;
            font-size: 13px;
            letter-spacing: 0.08em;
            padding: 14px 28px;
            cursor: pointer;
            position: relative;
            white-space: nowrap;
            transition: color 0.3s ease;
            flex-shrink: 0;
        }

            .tab-btn::after {
                content: '';
                position: absolute;
                bottom: -1px;
                left: 0;
                right: 0;
                height: 2px;
                background: var(--accent-color, var(--accent1));
                transform: scaleX(0);
                transition: transform 0.3s cubic-bezier(.4,0,.2,1);
            }

            .tab-btn:hover {
                color: var(--text);
            }

            .tab-btn:focus-visible {
                outline: 2px solid var(--accent-color, var(--accent1));
                outline-offset: -2px;
            }

            .tab-btn[aria-selected="true"] {
                color: var(--text);
            }

                .tab-btn[aria-selected="true"]::after {
                    transform: scaleX(1);
                }

        /* Tab panels */
        .tab-panel {
            display: none;
            animation: fadeIn 0.45s ease forwards;
        }

            .tab-panel.active {
                display: block;
            }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Song header */
        .song-header {
            margin-bottom: 44px;
        }

        .song-num {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.3em;
            color: var(--accent-c, var(--accent1));
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .song-title {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: clamp(30px, 6vw, 52px);
            letter-spacing: 0.04em;
            line-height: 1.2;
        }

        .song-line {
            width: 32px;
            height: 1px;
            background: var(--accent-c, var(--accent1));
            margin-top: 18px;
            opacity: 0.7;
        }

        /* Song credits */
        .song-credits {
            margin-top: 14px;
            font-size: 12px;
            line-height: 1.8;
            color: var(--muted);
        }

            .song-credits span {
                display: block;
            }

            .song-credits .credit-label {
                color: var(--accent-c, var(--accent1));
                font-family: 'Cormorant Garamond', serif;
                font-style: italic;
                margin-right: 6px;
            }

        /* YouTube Player */
        .yt-player-wrap {
            text-align: center;
            margin-bottom: 28px;
        }

            .yt-player-wrap iframe {
                border-radius: 8px;
                max-width: 100%;
            }

        /* Lyrics */
        .lyrics {
            font-size: 16px;
            line-height: 2.2;
        }

            .lyrics rt {
                font-size: 10px;
                color: #ffffff;
                letter-spacing: 0.05em;
            }

        .lyrics-wrap {
            position: relative;
            padding-left: 24px;
            border-left: 1px solid var(--border);
        }

        /* Lyric lines */
        .lyric-line {
            display: block;
            cursor: pointer;
            padding: 4px 8px;
            margin: 2px 0;
            border-radius: 4px;
            transition: background 0.3s, color 0.3s;
        }

            .lyric-line:hover {
                background: rgba(255,255,255,0.06);
            }

            .lyric-line.active {
                color: var(--accent-c, var(--accent1));
                background: rgba(201,169,110,0.1);
            }

            .lyric-line::before {
                content: '▶ ';
                font-size: 10px;
                opacity: 0;
                transition: opacity 0.2s;
            }

            .lyric-line:hover::before {
                opacity: 0.4;
            }

            .lyric-line.active::before {
                opacity: 0.8;
            }

        /* Footer */
        .page-footer {
            text-align: center;
            margin-top: 80px;
            padding-top: 32px;
            border-top: 1px solid var(--border);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.15em;
        }

        /* Play control */
        .play-control {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 100;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.2s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        }

            .play-control:hover {
                background: var(--accent1);
                color: var(--bg);
                transform: scale(1.1);
            }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="site-header">
            <div class="label">Lyrics Collection</div>
            <h1>歌詞</h1>
            <div class="divider"></div>
        </header>

        <!-- JS 會自動產生以下內容 -->
        <div id="artist-filter-container"></div>
        <nav class="tab-nav" id="tab-nav" role="tablist" aria-label="曲目切換"></nav>
        <div id="panels-container"></div>

        <footer class="page-footer" id="footer"></footer>
    </div>

    <button class="play-control" id="playPauseBtn" title="播放/暫停">⏸</button>

    <script>
        var players = {};
        var activeTabId = null;
        var trackingInterval = null;
        var userScrolling = false;
        var scrollTimeout = null;
        var songsData = [];

        // 載入歌曲資料 → 建構頁面 更改線上版或本地版的位置
        fetch('https://wen016016.github.io/lyrics-data/songs.json?_=' + new Date().getTime())
        //fetch('songs.json')
            .then(function (r) {
                if (!r.ok) throw new Error('HTTP ' + r.status);
                return r.json();
            })
            .then(function (songs) {
                // 依歌手名稱排序，同歌手的歌會排在一起
                songs.sort(function (a, b) {
                    if (a.artist < b.artist) return -1;
                    if (a.artist > b.artist) return 1;
                    return 0;
                });
                songsData = songs;
                buildArtistFilter(songs);
                buildTabs(songs);
                buildPanels(songs);
                updateFooter(songs);
                loadYouTubeAPI();
            })
            .catch(function (err) {
                console.error('載入 songs.json 失敗:', err);
            });

        // ===== 建構歌手篩選列 =====
        function buildArtistFilter(songs) {
            var container = document.getElementById('artist-filter-container');
            var artists = [];
            songs.forEach(function (s) {
                if (artists.indexOf(s.artist) === -1) artists.push(s.artist);
            });

            var html = '<div class="artist-filter" aria-label="歌手篩選">';
            html += '<button class="artist-filter-btn active" data-artist="all">全部</button>';
            artists.forEach(function (a) {
                html += '<button class="artist-filter-btn" data-artist="' + a + '">' + a + '</button>';
            });
            html += '</div>';
            container.innerHTML = html;

            // 篩選事件
            container.addEventListener('click', function (e) {
                var btn = e.target.closest('.artist-filter-btn');
                if (!btn) return;
                var artist = btn.getAttribute('data-artist');

                container.querySelectorAll('.artist-filter-btn').forEach(function (b) { b.classList.remove('active'); });
                btn.classList.add('active');

                var tabBtns = Array.from(document.querySelectorAll('.tab-btn'));
                var tabPanels = Array.from(document.querySelectorAll('.tab-panel'));
                var firstVisible = null;

                tabBtns.forEach(function (tab) {
                    var match = (artist === 'all' || tab.getAttribute('data-artist') === artist);
                    tab.style.display = match ? '' : 'none';
                    if (match && !firstVisible) firstVisible = tab;
                });

                if (firstVisible) {
                    if (activeTabId && players[activeTabId] && players[activeTabId].pauseVideo) players[activeTabId].pauseVideo();
                    tabBtns.forEach(function (t) { t.setAttribute('aria-selected', 'false'); t.classList.remove('active'); });
                    tabPanels.forEach(function (p) { p.classList.remove('active'); });
                    firstVisible.setAttribute('aria-selected', 'true');
                    firstVisible.classList.add('active');
                    var panelId = firstVisible.getAttribute('aria-controls');
                    var panel = document.getElementById(panelId);
                    if (panel) panel.classList.add('active');
                    activeTabId = panelId;
                    startTracking();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            });
        }

        // ===== 建構 Tab 按鈕 =====
        function buildTabs(songs) {
            var nav = document.getElementById('tab-nav');
            var html = '';
            songs.forEach(function (song, i) {
                var tabId = 'tab' + (i + 1);
                var selected = (i === 0) ? 'true' : 'false';
                html += '<button class="tab-btn' + (i === 0 ? ' active' : '') + '" role="tab"'
                    + ' aria-selected="' + selected + '"'
                    + ' aria-controls="' + tabId + '"'
                    + ' id="btn-' + tabId + '"'
                    + ' data-artist="' + song.artist + '"'
                    + ' style="--accent-color:' + song.color + '">'
                    + song.title + '</button>';
            });
            nav.innerHTML = html;

            // Tab 切換事件
            nav.addEventListener('click', function (e) {
                var btn = e.target.closest('.tab-btn');
                if (btn) switchTab(btn);
            });

            nav.addEventListener('keydown', function (e) {
                var current = document.activeElement;
                if (!current || !current.classList.contains('tab-btn')) return;
                var visibleTabs = Array.from(nav.querySelectorAll('.tab-btn')).filter(function (t) { return t.style.display !== 'none'; });
                var index = visibleTabs.indexOf(current);
                if (e.key === 'ArrowRight') index = (index + 1) % visibleTabs.length;
                else if (e.key === 'ArrowLeft') index = (index - 1 + visibleTabs.length) % visibleTabs.length;
                else return;
                e.preventDefault();
                visibleTabs[index].focus();
                switchTab(visibleTabs[index]);
            });
        }

        // ===== 建構歌詞面板 =====
        function buildPanels(songs) {
            var container = document.getElementById('panels-container');
            var html = '';

            songs.forEach(function (song, i) {
                var tabId = 'tab' + (i + 1);
                html += '<div class="tab-panel' + (i === 0 ? ' active' : '') + '" id="' + tabId + '"'
                    + ' role="tabpanel" aria-labelledby="btn-' + tabId + '"'
                    + ' style="--accent-c:' + song.color + '"'
                    + (song.videoId ? ' data-video-id="' + song.videoId + '"' : '') + '>';

                // Song header + credits
                html += '<div class="song-header">'
                    + '<div class="song-num">Track ' + String(i + 1).padStart(2, '0') + '</div>'
                    + '<h2 class="song-title">' + song.title + '</h2>'
                    + '<div class="song-line"></div>'
                    + '<div class="song-credits">'
                    + '<span><span class="credit-label">Artist</span> ' + song.artist + '</span>'
                    + (song.credits.lyrics ? '<span><span class="credit-label">Lyrics</span> ' + song.credits.lyrics + '</span>' : '')
                    + (song.credits.music ? '<span><span class="credit-label">Music</span> ' + song.credits.music + '</span>' : '')
                    + '</div></div>';

                // YouTube player (只在有 videoId 時才建立)
                if (song.videoId) {
                    html += '<div class="yt-player-wrap"><div class="yt-player" id="yt-player-' + tabId + '"></div></div>';
                }

                // Lyrics
                html += '<div class="lyrics-wrap"><div class="lyrics">';
                song.lines.forEach(function (line) {
                    html += '<span class="lyric-line" data-time="' + line.time + '">' + line.text + '</span>';
                });
                html += '</div></div></div>';
            });

            container.innerHTML = html;
            activeTabId = 'tab1';
        }

        function updateFooter(songs) {
            document.getElementById('footer').textContent = 'lyrics — ' + songs.length + ' songs';
        }

        // ===== Tab 切換 =====
        function switchTab(btn) {
            if (!btn) return;
            if (activeTabId && players[activeTabId] && players[activeTabId].pauseVideo) players[activeTabId].pauseVideo();

            document.querySelectorAll('.tab-btn').forEach(function (t) { t.setAttribute('aria-selected', 'false'); t.classList.remove('active'); });
            document.querySelectorAll('.tab-panel').forEach(function (p) { p.classList.remove('active'); });

            btn.setAttribute('aria-selected', 'true');
            btn.classList.add('active');
            var panelId = btn.getAttribute('aria-controls');
            var panel = document.getElementById(panelId);
            if (panel) panel.classList.add('active');

            activeTabId = panelId;
            startTracking();
            document.getElementById('playPauseBtn').textContent = '⏸';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ===== YouTube =====
        function loadYouTubeAPI() {
            var tag = document.createElement('script');
            tag.src = "https://www.youtube.com/iframe_api";
            document.head.appendChild(tag);
        }

        function onYouTubeIframeAPIReady() {
            var panels = document.querySelectorAll('.tab-panel[data-video-id]');
            panels.forEach(function (panel) {
                var tabId = panel.id;
                var videoId = panel.getAttribute('data-video-id');
                var playerDiv = panel.querySelector('.yt-player');
                if (!playerDiv || !videoId || videoId === 'null') return;

                players[tabId] = new YT.Player(playerDiv.id, {
                    height: '200', width: '360',
                    videoId: videoId,
                    playerVars: { autoplay: 0, controls: 1, rel: 0 },
                    events: { onReady: function () { setupLyricSync(tabId); } }
                });
            });
            activeTabId = 'tab1';
            startTracking();
        }

        function setupLyricSync(tabId) {
            var panel = document.getElementById(tabId);
            panel.querySelectorAll('.lyric-line').forEach(function (line) {
                line.addEventListener('click', function () {
                    var time = parseFloat(this.getAttribute('data-time'));
                    var player = players[tabId];
                    if (player && player.seekTo) {
                        player.seekTo(time, true);
                        player.playVideo();
                        document.getElementById('playPauseBtn').textContent = '⏸';
                    }
                });
            });
        }

        // ===== 播放追蹤 =====
        document.addEventListener('scroll', function () {
            userScrolling = true;
            if (scrollTimeout) clearTimeout(scrollTimeout);
            scrollTimeout = setTimeout(function () { userScrolling = false; }, 3000);
        }, true);

        function startTracking() {
            if (trackingInterval) clearInterval(trackingInterval);
            trackingInterval = setInterval(function () {
                if (!activeTabId || !players[activeTabId] || !players[activeTabId].getCurrentTime) return;
                var currentTime = players[activeTabId].getCurrentTime();
                var lines = Array.from(document.getElementById(activeTabId).querySelectorAll('.lyric-line'));
                var activeLine = null;
                for (var i = lines.length - 1; i >= 0; i--) {
                    if (currentTime >= parseFloat(lines[i].getAttribute('data-time'))) { activeLine = lines[i]; break; }
                }
                lines.forEach(function (l) { l.classList.remove('active'); });
                if (activeLine) {
                    activeLine.classList.add('active');
                    if (!userScrolling) activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 300);
        }

        // ===== 播放/暫停 =====
        var playPauseBtn = document.getElementById('playPauseBtn');
        playPauseBtn.addEventListener('click', function () {
            if (!activeTabId || !players[activeTabId]) return;
            var state = players[activeTabId].getPlayerState();
            if (state === 1) { players[activeTabId].pauseVideo(); playPauseBtn.textContent = '▶'; }
            else { players[activeTabId].playVideo(); playPauseBtn.textContent = '⏸'; }
        });

        document.addEventListener('keydown', function (e) {
            if (e.code === 'Space' && e.target === document.body) { e.preventDefault(); playPauseBtn.click(); }
        });
    </script>
</body>
</html>
